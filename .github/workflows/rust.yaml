name: Aurelia-TUI Rust Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

jobs:
  aurelia-deb:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxkbcommon-dev \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libgtk-3-dev \
            libpulse-dev \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Aurelia-TUI (release)
        run: cargo build --release

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb package
        run: cargo deb --no-build

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: aurelia-tui-deb
          path: target/debian/*.deb
          archive: false

  aurelia-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Aurelia-TUI (release)
        run: cargo build --release

      - name: Upload Windows binary
        uses: actions/upload-artifact@v7
        with:
          name: aurelia-tui-windows
          path: target/release/aurelia.exe
          archive: false
